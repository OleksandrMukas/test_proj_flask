name: My-Actions-Basics

########GLOBAL_ENV_VARIABLES#########
env:
  APPLICATION_NAME    : "MyFlaskApp"
  DEPLOY_PACKAGE_NAME : "flask-deploy-ver-${{ github.sha }}"
#####################################

on:
  push:
    branches:
      - main

jobs:
  my_testing:
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello message
        run: echo "Hello from Testing job"
        
      - name: Run few commands
        run: |
          echo "Message 1"
          echo "Message 2"
          echo "Application name: ${{ env.APPLICATION_NAME }}"
          
      - name: List current folder
        run: ls -la
        
      - name: Git clone my repo
        uses: actions/checkout@v6

      - name: List current folder
        run: ls -la
          
  my_deploy:
    runs-on: ubuntu-latest
    needs: my_testing
    steps:
      - name: Print Hello message
        run: echo "Hello from Deploy job"
        
      - name: Deployment package
        run: 'echo "Deploy package name: ${{ env.DEPLOY_PACKAGE_NAME }}"'







      
